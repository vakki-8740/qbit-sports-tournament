<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <title>QBIT SPORTS - Leaderboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="offline-popup"><i class="fas fa-wifi" style="text-decoration: line-through;"></i> No Internet Connection</div>
<div id="toast">Message</div>
<!-- AUTH PAGE -->
<div id="auth-page">
    <div class="auth-logo">
        <div style="width:90px; height:90px; border-radius:24px; background:linear-gradient(135deg, var(--primary), #34aeff); display:flex; align-items:center; justify-content:center; margin:0 auto 18px; box-shadow: 0 10px 30px rgba(0,122,255,0.3); animation: authLogoFloat 3s ease-in-out infinite;">
            <i class="fas fa-gamepad" style="font-size:40px; color:white;"></i>
        </div>
        <h1 class="auth-logo-text" id="auth-app-name">QBIT SPORTS</h1>
        <p style="font-size:15px; color:var(--text-muted); font-weight:500; margin-top:6px;">Play with Skill. Win Big.</p>
    </div>
    <button class="google-btn" onclick="handleGoogleLogin()" style="margin-top:30px;">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google"> Continue with Google
    </button>
    <p style="text-align:center; margin-top:20px; font-size:12px; color:var(--text-muted); font-weight:500;">Login or Sign Up both use Google</p>
</div>

<!-- MAIN APP -->
<div id="app-container" style="display:none;">
    <div class="header" style="padding: 15px 20px;">
        <div style="display:flex; align-items:center; gap:10px;">
            <div id="app-logo-header" style="width:36px; height:36px; border-radius:10px; background:linear-gradient(135deg, var(--primary), #34aeff); display:flex; align-items:center; justify-content:center; color:white; font-weight:900; font-size:16px; box-shadow:0 2px 8px rgba(0,122,255,0.3);">
                <img id="header-app-logo-img" src="" alt="" style="width:100%; height:100%; border-radius:10px; object-fit:cover; display:none;">
                <span id="header-app-logo-text">QS</span>
            </div>
            <div>
                <div id="header-app-name" style="font-size:17px; font-weight:800; color:var(--text-main); letter-spacing:-0.3px; line-height:1.1;">QBIT SPORTS</div>
                <div style="font-size:10px; color:var(--text-muted); font-weight:600;">Play & Win</div>
            </div>
        </div>
        <div style="display:flex; align-items:center; gap:10px;">
            <div class="wallet-badge" onclick="navigateTo('wallet.html')" style="margin-right:0;"><i class="fas fa-wallet"></i> ₹<span id="header-bal">0</span></div>
            <div id="user-avatar-header" onclick="navigateTo('profile.html')" style="width:36px; height:36px; border-radius:50%; background:linear-gradient(135deg, var(--primary), #34aeff); display:flex; align-items:center; justify-content:center; color:white; font-weight:700; font-size:14px; cursor:pointer; box-shadow:0 2px 8px rgba(0,0,0,0.1);"></div>
        </div>
    </div>
    <div class="main-content">
        <div id="rank">
            <div id="rank-tournaments-list"></div>
        </div>
    </div>
    <div class="bottom-nav">
        <a class="nav-item" href="home.html"><i class="fas fa-home"></i>Home</a>
        <a class="nav-item" href="javascript:void(0)" onclick="navigateTo('matches.html')"><i class="fas fa-gamepad"></i>Matches</a>
        <a class="nav-item active" href="rank.html"><i class="fas fa-trophy"></i>Rank</a>
        <a class="nav-item" href="javascript:void(0)" onclick="navigateTo('wallet.html')"><i class="fas fa-wallet"></i>Wallet</a>
        <a class="nav-item" href="javascript:void(0)" onclick="navigateTo('profile.html')"><i class="fas fa-user"></i>Profile</a>
    </div>
</div>

<!-- PROFILE COMPLETION -->
<div id="profile-complete-popup" class="profile-complete-overlay" style="display:none;" onclick="event.preventDefault(); event.stopPropagation();">
    <div class="profile-complete-card" onclick="event.stopPropagation();">
        <div class="pc-header">
            <div class="pc-icon"><i class="fas fa-user-plus"></i></div>
            <h2>Profile Complete Karo!</h2>
            <p>Fill all details, this popup won't close until done</p>
        </div>
        <div class="pc-field"><label>Your Name <span>*</span></label><input type="text" id="pc-name" placeholder="Enter your full name"></div>
        <div class="pc-field"><label>Phone Number <span>*</span></label><input type="number" id="pc-phone" placeholder="10-Digit Mobile Number" maxlength="10"><div class="pc-hint">Phone number will be used for login</div></div>
        <div class="pc-field"><label>Free Fire Name <span>*</span></label><input type="text" id="pc-ffname" placeholder="FF in-game name"></div>
        <div class="pc-field"><label>Free Fire UID <span>*</span></label><input type="number" id="pc-ffuid" placeholder="FF UID number"></div>
        <button class="btn" onclick="saveFullProfile()" style="margin-top:5px;"><span class="btn-text">Save & Continue</span><div class="spinner"></div></button>
    </div>
</div>



<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script src="firebase-db.js"></script>
<script src="common.js"></script>
<script src="home.js"></script>
<script src="rank.js"></script>
<script>
(async function() {
    var uid = FB.getCurrentUid();
    if(!uid) { document.getElementById('auth-page').style.display = 'flex'; return; }
    document.getElementById('auth-page').style.display = 'none';
    document.getElementById('app-container').style.display = 'flex';
    loadHeader();
    initRankData();
    try { window.adminSettings = await FB.getSettings(); } catch(e) {}
    try {
        var user = await FB.getUser(uid);
        if(user && (!user.phone || !user.ff_name || !user.ff_uid)) {
            document.getElementById('profile-complete-popup').style.display = 'flex';
            if(user.name) document.getElementById('pc-name').value = user.name;
        }
    } catch(e) {}
})();

</script>
</body>
</html>
